<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puesto de Control - IAME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background-color: #2d2d2d; border: none; border-radius: 15px; padding: 30px; text-align: center; max-width: 400px; width: 90%; }
        .status-icon { font-size: 3rem; color: #ffc107; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card shadow-lg border-top border-warning">
        <div class="status-icon">📡</div>
        <h3 class="text-warning mb-3">Sesión Activa</h3>
        <p class="lead">Puesto: <strong>{{ current_user.role | upper }}</strong></p>
        <hr class="border-secondary">
        <p class="text-light">El sistema está listo para procesar retiros.</p>
        <div class="alert alert-dark small">
            <strong>Instrucción:</strong> No cierres esta pestaña. Abre la <strong>Cámara</strong> de tu celular y escanea el QR del kart para entregar ítems.
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm mt-3">Cerrar Sesión</a>
    </div>
</body>
</html>
