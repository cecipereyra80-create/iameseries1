<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puesto de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background-color: #2d2d2d; border: none; border-radius: 15px; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-lg">
            <h3 class="text-warning mb-3">¡Sesión Iniciada!</h3>
            <p class="lead">Ingresaste al puesto: <strong>{{ current_user.role | upper }}</strong></p>
            <hr class="border-secondary">
            <p>Estás listo para operar en tu puesto.</p>
            <div class="alert alert-info">
                <strong>Instrucción:</strong> Deja esta pestaña abierta, abre la <strong>Cámara de tu celular</strong> y escanea el código QR del piloto.
            </div>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light mt-3">Cerrar Sesión</a>
        </div>
    </div>
</body>
</html>
